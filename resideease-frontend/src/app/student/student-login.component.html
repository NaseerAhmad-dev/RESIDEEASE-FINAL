<div class="login-page">
  <div class="login-card">

    <!-- Brand mark -->
    <div class="login-brand">
      <div class="brand-logo" aria-label="ResideEase logo">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="28" height="28" rx="8" fill="#0ab4a8"/>
          <path d="M14 5L5 11v12h6v-7h6v7h6V11L14 5z" fill="white"/>
        </svg>
      </div>
      <span class="brand-name">ResideEase</span>
    </div>

    <div class="login-head">
      <span class="login-eyebrow">Student Login</span>
      <h1>Access your dashboard</h1>
      <p>Enter your roll number and password to sign in.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" novalidate>
      <div class="field-group">
        <label for="rollNumber">Roll number</label>
        <input id="rollNumber" type="text" formControlName="rollNumber" placeholder="e.g. CS2021001" autocomplete="username" />
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
                 placeholder="Your password" autocomplete="current-password" />
          <button type="button" class="btn-eye" (click)="togglePassword()" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
            @if (showPassword) {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            } @else {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            }
          </button>
        </div>
      </div>

      @if (errorMessage) {
        <div class="error-message">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10 6v4M10 13v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          {{ errorMessage }}
        </div>
      }

      <button class="btn-login" type="submit" [disabled]="loading">
        @if (!loading) {
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M3 10h14M10 4l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        }
        {{ loading ? 'Signing in…' : 'Login' }}
      </button>
    </form>

    <p class="login-note">Your temporary password was provided when you were registered. Contact your administrator if you need a reset.</p>

  </div>
</div>
